<!-- 博客的文章详情页，详细展示 某一篇 选定的文章，以markdown语法展示文章的页面 -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <!-- hljs样式选择 -->
    <link rel="stylesheet" href="../css/github-dark.css" />
    <!-- <link rel="stylesheet" href="../css/default.min.css" /> -->
    <script type="module" src="../js/main.js" defer></script>
    <title>文章</title>
  </head>
  <body class="article">
    <div id="top-anchor"></div>

    <header class="header">
      <div class="header__sentinel"></div>
      <!-- 哨兵：观察目标 -->

      <div class="header__nav-container"></div>
    </header>

    <main>
      <div class="article__wrap">
        <div class="article__post--container hidden">文章</div>
        <div class="article__toc--container hidden">目录</div>
      </div>

      <!-- 文章不存在时的提示 -->
      <!-- <div id="not-found" style="display: none">
        <h2>404 - 文章未找到</h2>
        <p><a href="index.html">返回首页</a></p>
      </div> -->
    </main>

    <!-- 回到页面顶部组件的挂载点 -->
    <div class="backToTop__container"></div>
  </body>
</html>
